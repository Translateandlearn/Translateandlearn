<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translate & Learn 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  font-family: 'Tajawal', sans-serif;
  padding: 1rem;
}
.container { max-width: 680px; margin: 0 auto; }

header {
  text-align: center;
  padding: 1.5rem 0 1rem;
  color: white;
}
.logo { font-size: 3rem; margin-bottom: 0.3rem; }
h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 0.3rem; }
.sub { font-size: 0.95rem; opacity: 0.85; }

.search-box {
  background: white;
  border-radius: 20px;
  padding: 1rem;
  margin: 1rem 0;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.search-row { display: flex; gap: 0.5rem; }
input {
  flex: 1;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  padding: 0.75rem 1rem;
  font-size: 1rem;
  font-family: inherit;
  outline: none;
  direction: rtl;
  transition: border-color 0.2s;
}
input:focus { border-color: #667eea; }
.btn-search {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 0 1.2rem;
  font-size: 1.2rem;
  cursor: pointer;
  transition: transform 0.15s;
}
.btn-search:hover { transform: scale(1.05); }

.categories {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 0.75rem;
}
.cat-btn {
  background: #f3f0ff;
  border: 2px solid #c4b5fd;
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 0.8rem;
  cursor: pointer;
  font-family: inherit;
  color: #5b21b6;
  transition: all 0.2s;
}
.cat-btn:hover, .cat-btn.active {
  background: #667eea;
  border-color: #667eea;
  color: white;
}

/* Result card */
.result-card {
  background: white;
  border-radius: 20px;
  padding: 1.5rem;
  margin-bottom: 1rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  display: none;
  animation: pop 0.3s ease;
}
@keyframes pop {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.result-emoji { font-size: 4rem; text-align: center; margin-bottom: 0.5rem; }
.result-en {
  font-size: 2.2rem;
  font-weight: 900;
  color: #667eea;
  text-align: center;
  direction: ltr;
  margin-bottom: 0.25rem;
}
.result-ar {
  font-size: 1.4rem;
  font-weight: 700;
  color: #333;
  text-align: center;
  margin-bottom: 1rem;
}
.result-pron {
  text-align: center;
  font-family: monospace;
  color: #888;
  font-size: 0.9rem;
  margin-bottom: 1rem;
  direction: ltr;
}
.examples-title {
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 0.5rem;
  font-weight: 700;
}
.example {
  background: #f3f0ff;
  border-right: 4px solid #667eea;
  border-radius: 8px;
  padding: 0.6rem 0.8rem;
  font-size: 0.9rem;
  margin-bottom: 0.4rem;
  direction: ltr;
  color: #333;
}
.tip {
  background: #fff8e1;
  border-radius: 12px;
  padding: 0.75rem 1rem;
  font-size: 0.88rem;
  color: #7c4700;
  margin-top: 0.75rem;
  direction: ltr;
}
.tip::before { content: "💡 "; }

.not-found {
  background: white;
  border-radius: 20px;
  padding: 2rem;
  text-align: center;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.not-found .emoji { font-size: 3rem; margin-bottom: 0.5rem; }

/* Words grid */
.words-section {
  background: white;
  border-radius: 20px;
  padding: 1.2rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.words-title {
  font-size: 0.9rem;
  color: #888;
  margin-bottom: 0.75rem;
  font-weight: 700;
}
.words-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 0.5rem;
}
.word-card {
  background: linear-gradient(135deg, #f3f0ff, #fdf4ff);
  border: 2px solid #e9d5ff;
  border-radius: 12px;
  padding: 0.6rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.word-card:hover {
  border-color: #667eea;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(102,126,234,0.2);
}
.word-card .wc-emoji { font-size: 1.4rem; }
.word-card .wc-ar { font-size: 0.85rem; font-weight: 700; color: #333; }
.word-card .wc-en { font-size: 0.75rem; color: #667eea; direction: ltr; }

footer {
  text-align: center;
  color: rgba(255,255,255,0.6);
  font-size: 0.75rem;
  padding: 1rem 0;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">📚✨</div>
    <h1>Translate & Learn</h1>
    <p class="sub">تعلّمي الإنجليزية بطريقة ممتعة!</p>
    <br>
    
    <div style="font-size:0.9rem;color:rgba(255,255,255,0.9);font-weight:700;margin-bottom:4px;">تصميم المعلمة : اثير البحيري</div>
  <div style="font-size:0.9rem;color:rgba(255,255,255,0.7);margin-bottom:6px;">ثانوية الابناء الاولى</div>
     <div style="font-size:0.9rem;color:rgba(255,255,255,0.7);margin-bottom:6px;">اولمبياد اللغة الانجليزية</div>
  </header>

  <div class="search-box">
    <div class="search-row">
      <input id="inp" type="text" placeholder="ابحثي عن كلمة بالعربي أو الإنجليزي..." />
      <button class="btn-search" onclick="search()">🔍</button>
    </div>
    <div class="categories" id="cats"></div>
  </div>

  <div class="result-card" id="result">
    <div class="result-emoji" id="rEmoji"></div>
    <div class="result-en" id="rEn"></div>
    <div class="result-pron" id="rPron"></div>
    <button onclick="speak()" style="
      background:linear-gradient(135deg,#667eea,#764ba2);
      color:white;border:none;border-radius:100px;
      padding:8px 22px;font-size:1rem;cursor:pointer;
      margin:0.5rem auto;display:block;font-family:inherit;
    ">🔊 استمعي للكلمة</button>
    <div class="result-ar" id="rAr"></div>
    <div id="rEx" style="margin-top:0.8rem;"></div>
  </div>

  <div class="not-found" id="notFound">
    <div class="emoji">🤔</div>
    <div style="font-size:1rem;color:#666">ما وجدنا هذه الكلمة، جربي كلمة أخرى!</div>
  </div>

  <div class="words-section">
    <div class="words-title" id="gridTitle">📖 جميع الكلمات</div>
    <div class="words-grid" id="grid"></div>
  </div>

  <footer>
  <div style="font-size:0.7rem;color:rgba(255,255,255,0.4);">Translate & Learn · 2026</div>
</footer>
</div>

const categories = ["الكل", ...new Set(dictionary.map(w => w.cat))];
let activeCat = "الكل";

// Build category buttons
const catsDiv = document.getElementById('cats');
categories.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn' + (c === 'الكل' ? ' active' : '');
  btn.textContent = c;
  btn.onclick = () => {
    activeCat = c;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(c);
    document.getElementById('result').style.display = 'none';
    document.getElementById('notFound').style.display = 'none';
  };
  catsDiv.appendChild(btn);
});

function renderGrid(cat) {
  const grid = document.getElementById('grid');
  const title = document.getElementById('gridTitle');
  const filtered = cat === 'الكل' ? dictionary : dictionary.filter(w => w.cat === cat);
  title.textContent = `📖 ${cat === 'الكل' ? 'جميع الكلمات' : cat} (${filtered.length} كلمة)`;
  grid.innerHTML = '';
  filtered.forEach(w => {
    const card = document.createElement('div');
    card.className = 'word-card';
    card.innerHTML = `<div class="wc-emoji">${w.emoji}</div><div class="wc-ar">${w.ar}</div><div class="wc-en">${w.en}</div>`;
    card.onclick = () => showWord(w);
    grid.appendChild(card);
  });
}

function speak() {
  const word = document.getElementById('rEn').textContent;
  if (!word) return;
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function showWord(w) {
  document.getElementById('rEmoji').textContent = w.emoji;
  document.getElementById('rEn').textContent = w.en;
  document.getElementById('rPron').textContent = w.pron;
  document.getElementById('rAr').textContent = w.ar;

  const exDiv = document.getElementById('rEx');
  exDiv.innerHTML = '<div style="font-size:0.8rem;color:#888;font-weight:700;margin-bottom:0.4rem;direction:rtl;">📝 أمثلة:</div>';
  w.ex.slice(0,2).forEach(e => {
    const d = document.createElement('div');
    d.style.cssText = 'background:#f3f0ff;border-right:4px solid #667eea;border-radius:8px;padding:0.6rem 0.8rem;font-size:0.9rem;margin-bottom:0.4rem;direction:ltr;color:#333;cursor:pointer;';
    d.textContent = e;
    d.title = 'اضغطي للاستماع';
    d.onclick = () => {
      const u = new SpeechSynthesisUtterance(e);
      u.lang = 'en-US'; u.rate = 0.8;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    };
    exDiv.appendChild(d);
  });

  document.getElementById('result').style.display = 'block';
  document.getElementById('notFound').style.display = 'none';
  document.getElementById('result').scrollIntoView({behavior:'smooth', block:'nearest'});
  const utter = new SpeechSynthesisUtterance(w.en);
  utter.lang = 'en-US'; utter.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function search() {
  const q = document.getElementById('inp').value.trim().toLowerCase();
  if (!q) return;
  const found = dictionary.find(w =>
    w.ar.includes(q) || w.en.toLowerCase().includes(q)
  );
  if (found) {
    showWord(found);
  } else {
    document.getElementById('result').style.display = 'none';
    document.getElementById('notFound').style.display = 'block';
  }
}

document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});

renderGrid('الكل');
</script>
